services:
  trabalhoacademico:
    image: trabalhoacademico:latest
    container_name: trabalhoacademico
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - trabalhoacademico-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: trabalhoacademico_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: trabalhoacademico
      MYSQL_USER: trabalhoacademico
      MYSQL_PASSWORD: trabalhoacademico
      MYSQL_ROOT_PASSWORD: trabalhoacademico
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - trabalhoacademico-network

  selenium:
    image: selenium/standalone-chrome
    container_name: trabalhoacademico_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - trabalhoacademico-network
    shm_size: 2gb
    
  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: trabalhoacademico_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      trabalhoacademico-network:
        aliases:
          - auth.local

networks:
  trabalhoacademico-network:

volumes:
  mariadb_data: